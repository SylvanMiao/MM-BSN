model:
  kwargs:
    type: MMBSN
    pd_a: 4
    pd_b: 2
    pd_pad: 2
    R3: True
    R3_T: 8
    R3_p: 0.16
    in_ch: 1
    bsn_base_ch: 128
    bsn_num_module: 9
    DCL1_num: 2
    DCL2_num: 7
    mask_type: 'o_a45'
    use_lca: False          

model_input: [noisy]

training:
  dataset: Confocal

  dataset_args:
    crop_size: [256, 256]      # must be divisible by pd_a (4)
    aug: ['hflip', 'rot']
    n_repeat: 4

  batch_size: 4

  max_epoch: 100

  init_lr: 2e-4
  scheduler:
    type: step
    step:
      step_size: 15
      gamma: 0.5
  loss: 1*self_L1
  tmp_info: []
  optimizer:
    type: Adam
    Adam:
      betas: [0.9, 0.999]

  warmup: False
  warmup_iter: 200

validation:
  dataset: Confocal

  dataset_args:
    crop_size: None
    n_data: 10

  norm_factor: 65535.0
  add_con: 0.5
  floor: True

  val: True
  save_image: True

  start_epoch: 1
  interval_epoch: 1

checkpoint:
  save: True
  start_epoch: 1
  interval_epoch: 1

log:
  interval_iter: 10

test:
  dataset: Confocal

  dataset_args:
    crop_size: [256,256]

  norm_factor: 65535.0
  add_con: 0.0
  floor: False

  save_image: True
